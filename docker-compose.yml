version: "3.9"
services:
  node1:
    build: ./node
    ports: ["8081:8080"]
    environment:
      PORT: "8080"
      DATA_DIR: /data
      LOG_LEVEL: debug
    volumes:
      - node1_data:/data

  node2:
    build: ./node
    ports: ["8082:8080"]
    environment:
      PORT: "8080"
      DATA_DIR: /data
    volumes:
      - node2_data:/data

  node3:
    build: ./node
    ports: ["8083:8080"]
    environment:
      PORT: "8080"
      DATA_DIR: /data
    volumes:
      - node3_data:/data

volumes:
  node1_data:
  node2_data:
  node3_data:
